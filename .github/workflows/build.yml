name: Build APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install platform dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev lzma lzma-dev liblzma-dev openjdk-17-jdk

      - name: Install Buildozer and Cython
        run: |
          pip install --upgrade pip
          pip install buildozer cython==0.29.33 kivy==2.3.0

      - name: Create Perfect Buildozer Spec
        run: |
          # Generar archivo base limpio
          buildozer init
          
          # Forzar los parámetros correctos de forma directa y agresiva
          sed -i 's|^title = .*|title = Calculadora de Horas|' buildozer.spec
          sed -i 's|^package.name = .*|package.name = calculadorahoras|' buildozer.spec
          sed -i 's|^requirements = .*|requirements = python3==3.11.9,kivy==2.3.0|' buildozer.spec
          sed -i 's|^android.archs = .*|android.archs = arm64-v8a|' buildozer.spec
          sed -i 's|^android.minapi = .*|android.minapi = 26|' buildozer.spec
          sed -i 's|^#\? \?android.sdk = .*|android.sdk = 33|' buildozer.spec
          
          # Bloquear el NDK en la versión estable r25b (evita que use la r28c corrupta)
          sed -i 's|^#\? \?android.ndk = .*|android.ndk = 25b|' buildozer.spec
          sed -i 's|^#\? \?android.ndk_path = .*|android.ndk_path = /home/runner/.buildozer/android/platform/android-ndk-r25b|' buildozer.spec

      - name: Fix SDK Manager and Pre-download NDK r25b
        run: |
          mkdir -p ~/.buildozer/android/platform/
          
          # Instalar las herramientas de SDK correctas
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline.zip
          unzip -q cmdline.zip -d ~/.buildozer/android/platform/
          mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools/
          mv ~/.buildozer/android/platform/cmdline-tools ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest
          mkdir -p ~/.buildozer/android/platform/android-sdk/tools/bin
          ln -s ~/.buildozer/android/platform/android-sdk/cmdline-tools/latest/bin/sdkmanager ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager
          
          # Forzar descarga manual del NDK r25b para que no intente buscar el r28c
          wget https://dl.google.com/android/repository/android-ndk-r25b-linux.zip -O ndk.zip
          unzip -q ndk.zip -d ~/.buildozer/android/platform/
          
          # Configurar licencias de Android
          mkdir -p ~/.buildozer/android/platform/android-sdk/licenses
          echo -e "24a3327a06831742c91c6511a4749866c13b1e37\n893a0a6d393b545a1d65fdd202225b441d0d2ec4\n24333f8a63b6825ea9c5514f83c2829b004d1fee\na5c1c04e3159b92920f7222d3be3a7ad5d6ee55a\nd56f5187479451eabf01fb7431de55433224d198\n2f38c566547de0f00dfa047d38a0b3112283f5d8\nc12a99c3474492b9b44a059d264857bb134433e4" > ~/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

      - name: Build with Buildozer
        run: buildozer -v android debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calculadora-APK
          path: bin/*.apk
